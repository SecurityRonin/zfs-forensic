# cargo-deny configuration — supply-chain and licence gate.
[graph]
all-features = false

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# This crate is Apache-2.0; permit only permissive, non-copyleft licences.
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-2-Clause", "BSD-3-Clause", "Unicode-3.0", "ISC", "Zlib"]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
